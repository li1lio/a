<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liger Co - Digital Products</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@remix-run/router@1.13.0/dist/router.umd.min.js"></script>
    <script src="https://unpkg.com/react-router@6.20.0/dist/umd/react-router.production.min.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.20.0/dist/umd/react-router-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .prose {
            color: #374151;
            max-width: 65ch;
        }
        .prose h1 {
            font-size: 2.25em;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 0.8888889em;
            line-height: 1.1111111;
        }
        .prose h2 {
            font-size: 1.5em;
            font-weight: 700;
            margin-top: 2em;
            margin-bottom: 1em;
            line-height: 1.3333333;
        }
        .prose h3 {
            font-size: 1.25em;
            font-weight: 600;
            margin-top: 1.6em;
            margin-bottom: 0.6em;
            line-height: 1.6;
        }
        .prose p {
            margin-top: 1.25em;
            margin-bottom: 1.25em;
            line-height: 1.75;
        }
        .prose a {
            color: #2563eb;
            text-decoration: underline;
            font-weight: 500;
        }
        .prose strong {
            font-weight: 600;
        }
        .prose ul, .prose ol {
            margin-top: 1.25em;
            margin-bottom: 1.25em;
            padding-left: 1.625em;
        }
        .prose li {
            margin-top: 0.5em;
            margin-bottom: 0.5em;
        }
        .prose img {
            margin-top: 2em;
            margin-bottom: 2em;
        }
        .prose blockquote {
            font-weight: 500;
            font-style: italic;
            color: #374151;
            border-left-width: 0.25rem;
            border-left-color: #e5e7eb;
            margin-top: 1.6em;
            margin-bottom: 1.6em;
            padding-left: 1em;
        }
        .prose-lg {
            font-size: 1.125rem;
            line-height: 1.7777778;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { HashRouter, Routes, Route, Link, useParams, useNavigate } = window.ReactRouterDOM;

        // Storage utilities
        const ADMIN_USERNAME = 'sadithas59@gmail.com';
        const ADMIN_PASSWORD = 'Time?7@@';

        const verifyAdmin = (username, password) => {
            return username === ADMIN_USERNAME && password === ADMIN_PASSWORD;
        };

        const isAdminLoggedIn = () => {
            return localStorage.getItem('adminLoggedIn') === 'true';
        };

        const loginAdmin = () => {
            localStorage.setItem('adminLoggedIn', 'true');
        };

        const logoutAdmin = () => {
            localStorage.removeItem('adminLoggedIn');
        };

        const getProducts = () => {
            const products = localStorage.getItem('products');
            return products ? JSON.parse(products) : [];
        };

        const saveProduct = (product) => {
            const products = getProducts();
            products.push(product);
            localStorage.setItem('products', JSON.stringify(products));
        };

        const getProductById = (id) => {
            const products = getProducts();
            return products.find(p => p.id === id);
        };

        const deleteProduct = (id) => {
            const products = getProducts().filter(p => p.id !== id);
            localStorage.setItem('products', JSON.stringify(products));
        };

        const getPosts = () => {
            const posts = localStorage.getItem('posts');
            return posts ? JSON.parse(posts) : [];
        };

        const savePost = (post) => {
            const posts = getPosts();
            posts.push(post);
            localStorage.setItem('posts', JSON.stringify(posts));
        };

        const getPostById = (id) => {
            const posts = getPosts();
            return posts.find(p => p.id === id);
        };

        const deletePost = (id) => {
            const posts = getPosts().filter(p => p.id !== id);
            localStorage.setItem('posts', JSON.stringify(posts));
        };

        const generateUniqueId = () => {
            return `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
        };

        // HomePage Component
        function HomePage() {
            const products = getProducts();
            const posts = getPosts();

            return (
                <div className="min-h-screen bg-white">
                    <header className="border-b border-gray-200">
                        <div className="container mx-auto px-4 py-6">
                            <div className="flex items-center justify-between">
                                <Link to="/" className="text-3xl font-bold text-gray-900">
                                    Liger Co
                                </Link>
                                <nav className="flex gap-6">
                                    <Link to="/products" className="text-gray-700 hover:text-gray-900">
                                        Products
                                    </Link>
                                    <Link to="/posts" className="text-gray-700 hover:text-gray-900">
                                        Posts
                                    </Link>
                                    <Link to="/admin" className="text-gray-700 hover:text-gray-900">
                                        Admin
                                    </Link>
                                </nav>
                            </div>
                        </div>
                    </header>

                    <section className="bg-gray-50 py-20">
                        <div className="container mx-auto px-4 text-center">
                            <h1 className="text-5xl font-bold text-gray-900 mb-4">
                                Welcome to Liger Co
                            </h1>
                            <p className="text-xl text-gray-600 mb-8">
                                Your Source for Premium Digital Products
                            </p>
                            <div className="flex gap-4 justify-center">
                                <Link
                                    to="/products"
                                    className="bg-gray-900 text-white px-8 py-3 rounded-md hover:bg-gray-800"
                                >
                                    Browse Products
                                </Link>
                                <Link
                                    to="/posts"
                                    className="border border-gray-900 text-gray-900 px-8 py-3 rounded-md hover:bg-gray-100"
                                >
                                    Read Posts
                                </Link>
                            </div>
                        </div>
                    </section>

                    <section className="py-16">
                        <div className="container mx-auto px-4">
                            <h2 className="text-3xl font-bold text-gray-900 mb-8">Latest Products</h2>
                            {products.length === 0 ? (
                                <p className="text-gray-600">No products available yet.</p>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {products.slice(-6).reverse().map((product) => (
                                        <Link
                                            key={product.id}
                                            to={`/products/${product.id}`}
                                            className="border border-gray-200 rounded-lg overflow-hidden hover:shadow-lg"
                                        >
                                            <img
                                                src={product.imageUrl}
                                                alt={product.name}
                                                className="w-full h-48 object-cover"
                                            />
                                            <div className="p-4">
                                                <h3 className="font-bold text-lg mb-2">{product.name}</h3>
                                                <p className="text-gray-600 text-sm mb-2">{product.description}</p>
                                                <div className="flex justify-between items-center">
                                                    <span className="text-sm text-gray-500">{product.category}</span>
                                                    <span className="font-bold text-gray-900">LKR {product.price.toLocaleString()}</span>
                                                </div>
                                            </div>
                                        </Link>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>

                    <section className="py-16 bg-gray-50">
                        <div className="container mx-auto px-4">
                            <h2 className="text-3xl font-bold text-gray-900 mb-8">Latest Posts</h2>
                            {posts.length === 0 ? (
                                <p className="text-gray-600">No posts available yet.</p>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {posts.slice(-6).reverse().map((post) => (
                                        <Link
                                            key={post.id}
                                            to={`/posts/${post.id}`}
                                            className="bg-white border border-gray-200 rounded-lg overflow-hidden hover:shadow-lg"
                                        >
                                            <img
                                                src={post.imageUrl}
                                                alt={post.title}
                                                className="w-full h-48 object-cover"
                                            />
                                            <div className="p-4">
                                                <h3 className="font-bold text-lg mb-2">{post.title}</h3>
                                                <span className="text-sm text-gray-500">{post.category}</span>
                                            </div>
                                        </Link>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>

                    <footer className="bg-gray-900 text-white py-8">
                        <div className="container mx-auto px-4 text-center">
                            <p>&copy; 2024 Liger Co. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // AdminLogin Component
        function AdminLogin() {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const navigate = useNavigate();

            useEffect(() => {
                if (isAdminLoggedIn()) {
                    navigate('/admin/dashboard');
                }
            }, [navigate]);

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');
                if (verifyAdmin(username, password)) {
                    loginAdmin();
                    navigate('/admin/dashboard');
                } else {
                    setError('Invalid username or password');
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center px-4">
                    <div className="max-w-md w-full bg-white rounded-lg shadow-md p-8">
                        <h1 className="text-3xl font-bold text-gray-900 mb-2 text-center">Liger Co</h1>
                        <h2 className="text-xl text-gray-600 mb-8 text-center">Admin Login</h2>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label htmlFor="username" className="block text-sm font-medium text-gray-700 mb-2">
                                    Username
                                </label>
                                <input
                                    type="email"
                                    id="username"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-gray-900 focus:border-transparent"
                                    required
                                />
                            </div>
                            <div>
                                <label htmlFor="password" className="block text-sm font-medium text-gray-700 mb-2">
                                    Passcode
                                </label>
                                <input
                                    type="password"
                                    id="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-gray-900 focus:border-transparent"
                                    required
                                />
                            </div>
                            {error && (
                                <div className="bg-red-50 border border-red-200 text-red-600 px-4 py-2 rounded-md text-sm">
                                    {error}
                                </div>
                            )}
                            <button
                                type="submit"
                                className="w-full bg-gray-900 text-white py-2 rounded-md hover:bg-gray-800"
                            >
                                Login
                            </button>
                        </form>
                        <div className="mt-6 text-center">
                            <Link to="/" className="text-sm text-gray-600 hover:text-gray-900">
                                Back to Home
                            </Link>
                        </div>
                    </div>
                </div>
            );
        }

        // AdminDashboard Component
        function AdminDashboard() {
            const navigate = useNavigate();
            const [activeTab, setActiveTab] = useState('products');
            
            const [productName, setProductName] = useState('');
            const [productDescription, setProductDescription] = useState('');
            const [productPrice, setProductPrice] = useState('');
            const [productCategory, setProductCategory] = useState('');
            const [productImageUrl, setProductImageUrl] = useState('');
            
            const [postTitle, setPostTitle] = useState('');
            const [postHtmlContent, setPostHtmlContent] = useState('');
            const [postCategory, setPostCategory] = useState('');
            const [postImageUrl, setPostImageUrl] = useState('');
            const [products, setProducts] = useState([]);
            const [posts, setPosts] = useState([]);

            useEffect(() => {
                if (!isAdminLoggedIn()) {
                    navigate('/admin');
                }
                loadData();
            }, [navigate]);

            const loadData = () => {
                setProducts(getProducts());
                setPosts(getPosts());
            };

            const handleLogout = () => {
                logoutAdmin();
                navigate('/admin');
            };

            const handleProductImageChange = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setProductImageUrl(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handlePostImageChange = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setPostImageUrl(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleProductSubmit = (e) => {
                e.preventDefault();
                
                const newProduct = {
                    id: generateUniqueId(),
                    name: productName,
                    description: productDescription,
                    price: parseFloat(productPrice),
                    imageUrl: productImageUrl,
                    category: productCategory,
                    createdAt: new Date().toISOString()
                };
                saveProduct(newProduct);
                
                setProductName('');
                setProductDescription('');
                setProductPrice('');
                setProductCategory('');
                setProductImageUrl('');
                
                loadData();
                alert('Product added successfully!');
            };

            const handlePostSubmit = (e) => {
                e.preventDefault();
                
                const newPost = {
                    id: generateUniqueId(),
                    title: postTitle,
                    htmlContent: postHtmlContent,
                    imageUrl: postImageUrl,
                    category: postCategory,
                    createdAt: new Date().toISOString()
                };
                savePost(newPost);
                
                setPostTitle('');
                setPostHtmlContent('');
                setPostCategory('');
                setPostImageUrl('');
                
                loadData();
                alert('Post added successfully!');
            };

            const handleDeleteProduct = (id) => {
                if (confirm('Are you sure you want to delete this product?')) {
                    deleteProduct(id);
                    loadData();
                }
            };

            const handleDeletePost = (id) => {
                if (confirm('Are you sure you want to delete this post?')) {
                    deletePost(id);
                    loadData();
                }
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    <header className="bg-white border-b border-gray-200">
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <h1 className="text-2xl font-bold text-gray-900">Liger Co - Admin Dashboard</h1>
                                <div className="flex gap-4">
                                    <Link to="/" className="text-gray-700 hover:text-gray-900">
                                        View Site
                                    </Link>
                                    <button
                                        onClick={handleLogout}
                                        className="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700"
                                    >
                                        Logout
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="container mx-auto px-4 py-8">
                        <div className="flex gap-4 mb-8 border-b border-gray-200">
                            <button
                                onClick={() => setActiveTab('products')}
                                className={`px-6 py-3 font-medium ${
                                    activeTab === 'products'
                                        ? 'border-b-2 border-gray-900 text-gray-900'
                                        : 'text-gray-600 hover:text-gray-900'
                                }`}
                            >
                                Products
                            </button>
                            <button
                                onClick={() => setActiveTab('posts')}
                                className={`px-6 py-3 font-medium ${
                                    activeTab === 'posts'
                                        ? 'border-b-2 border-gray-900 text-gray-900'
                                        : 'text-gray-600 hover:text-gray-900'
                                }`}
                            >
                                Posts
                            </button>
                        </div>

                        {activeTab === 'products' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div className="bg-white rounded-lg shadow-md p-6">
                                    <h2 className="text-xl font-bold text-gray-900 mb-4">Add New Product</h2>
                                    <form onSubmit={handleProductSubmit} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Product Name
                                            </label>
                                            <input
                                                type="text"
                                                value={productName}
                                                onChange={(e) => setProductName(e.target.value)}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-gray-900"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Description
                                            </label>
                                            <textarea
                                                value={productDescription}
                                                onChange={(e) => setProductDescription(e.target.value)}
                                                rows={3}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-gray-900"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Price (LKR)
                                            </label>
                                            <input
                                                type="number"
                                                value={productPrice}
                                                onChange={(e) => setProductPrice(e.target.value)}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-gray-900"
                                                required
                                                min="0"
                                                step="0.01"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Category
                                            </label>
                                            <select
                                                value={productCategory}
                                                onChange={(e) => setProductCategory(e.target.value)}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-gray-900"
                                                required
                                            >
                                                <option value="">Select Category</option>
                                                <option value="Software">Software</option>
                                                <option value="Templates">Templates</option>
                                                <option value="Graphics">Graphics</option>
                                                <option value="Courses">Courses</option>
                                                <option value="Other">Other</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Image URL
                                            </label>
                                            <input
                                                type="url"
                                                value={productImageUrl}
                                                onChange={(e) => setProductImageUrl(e.target.value)}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-gray-900"
                                                placeholder="https://example.com/image.jpg"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Or Upload Image
                                            </label>
                                            <input
                                                type="file"
                                                accept="image/*"
                                                onChange={handleProductImageChange}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-md"
                                            />
                                        </div>
                                        {productImageUrl && (
                                            <img src={productImageUrl} alt="Preview" className="w-full h-48 object-cover rounded-md" />
                                        )}
                                        <button
                                            type="submit"
                                            className="w-full bg-gray-900 text-white py-2 rounded-md hover:bg-gray-800"
                                        >
                                            Add Product
                                        </button>
                                    </form>
                                </div>

                                <div className="bg-white rounded-lg shadow-md p-6">
                                    <h2 className="text-xl font-bold text-gray-900 mb-4">All Products ({products.length})</h2>
                                    <div className="space-y-4 max-h-[600px] overflow-y-auto">
                                        {products.length === 0 ? (
                                            <p className="text-gray-600">No products yet.</p>
                                        ) : (
                                            products.map((product) => (
                                                <div key={product.id} className="border border-gray-200 rounded-lg p-4">
                                                    <div className="flex gap-4">
                                                        <img
                                                            src={product.imageUrl}
                                                            alt={product.name}
                                                            className="w-24 h-24 object-cover rounded"
                                                        />
                                                        <div className="flex-1">
                                                            <h3 className="font-bold text-lg">{product.name}</h3>
                                                            <p className="text-sm text-gray-600">{product.description}</p>
                                                            <p className="text-sm text-gray-500 mt-1">Category: {product.category}</p>
                                                            <p className="font-bold text-gray-900 mt-1">LKR {product.price.toLocaleString()}</p>
                                                            <p className="text-xs text-gray-400 mt-1">
                                                                URL: /products/{product.id}
                                                            </p>
                                                        </div>
                                                        <button
                                                            onClick={() => handleDeleteProduct(product.id)}
                                                            className="text-red-600 hover:text-red-700 px-3"
                                                        >
                                                            Delete
                                                        </button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'posts' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div className="bg-white rounded-lg shadow-md p-6">
                                    <h2 className="text-xl font-bold text-gray-900 mb-4">Add New Post</h2>
                                    <form onSubmit={handlePostSubmit} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Post Title
                                            </label>
                                            <input
                                                type="text"
                                                value={postTitle}
                                                onChange={(e) => setPostTitle(e.target.value)}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-gray-900"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                HTML Content
                                            </label>
                                            <textarea
                                                value={postHtmlContent}
                                                onChange={(e) => setPostHtmlContent(e.target.value)}
                                                rows={8}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-gray-900 font-mono text-sm"
                                                placeholder="<h1>Your HTML here</h1>"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Category
                                            </label>
                                            <select
                                                value={postCategory}
                                                onChange={(e) => setPostCategory(e.target.value)}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-gray-900"
                                                required
                                            >
                                                <option value="">Select Category</option>
                                                <option value="News">News</option>
                                                <option value="Tutorial">Tutorial</option>
                                                <option value="Update">Update</option>
                                                <option value="Other">Other</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Image URL
                                            </label>
                                            <input
                                                type="url"
                                                value={postImageUrl}
                                                onChange={(e) => setPostImageUrl(e.target.value)}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-gray-900"
                                                placeholder="https://example.com/image.jpg"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Or Upload Image
                                            </label>
                                            <input
                                                type="file"
                                                accept="image/*"
                                                onChange={handlePostImageChange}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-md"
                                            />
                                        </div>
                                        {postImageUrl && (
                                            <img src={postImageUrl} alt="Preview" className="w-full h-48 object-cover rounded-md" />
                                        )}
